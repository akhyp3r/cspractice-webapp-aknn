<style>
:root {

* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  font-family: Arial, Helvetica, sans-serif;

  background:

.hero {

  margin: 0 auto;

}

  margin: 0;
  font-size: clamp(1.7rem, 5vw, 3rem);

}
p, li {
  color: var(--muted);
  line-height: 1.6;
}
.big-button {
  display: inline-block;
  margin: 8px 8px 8px 0;
  padding: 13px 16px;
  border-radius: 999px;
  background: linear-gradient(135deg, rgba(56,189,248,.28), rgba(167,139,250,.25));
  color: var(--text);
  font-weight: 900;
  text-decoration: none;
  border: 1px solid rgba(56,189,248,.35);
}
.card {
  margin-top: 18px;
  padding: 16px;
  border-radius: 22px;
  background: rgba(248,250,252,.07);
  border: 1px solid rgba(248,250,252,.10);

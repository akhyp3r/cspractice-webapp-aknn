Papers Folder</a>\n<div class=\"card warn\"><strong>Reminder:</strong> Practise with official Pearson mark schemes and examiner reports where possible.</div>\n<div class=\"card\">\n  <h2>Suggested practice method</h2>\n  <ul>\n    <li>Try the paper first without checking answers.</li>\n    <li>Mark using the official mark scheme.</li>\n    <li>Rewrite weak answers in Pearson-style wording.</li>\n    <li>Save repeated mistakes into flashcards.</li>\n  </ul>\n</div>\n\n</section>\n</body>\n</html>";

function printFrame() {

function openFull() {
  const blob = new Blob([appHTML], {type: "text/html"});
  const url = URL.createObjectURL(blob);
  window.open(url, "_blank");
}
